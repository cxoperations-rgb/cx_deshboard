<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>고객지원파트 지표 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Pro Text',system-ui,-apple-system,sans-serif;background:#f5f5f7;color:#1d1d1f;-webkit-font-smoothing:antialiased}
header{background:#000;padding:12px clamp(12px,2vw,24px);display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px}
header h1{font-family:'SF Pro Display',system-ui,-apple-system,sans-serif;font-size:clamp(13px,1.5vw,16px);font-weight:600;color:#fff;letter-spacing:-.374px;white-space:nowrap}
header p{font-size:11px;color:rgba(255,255,255,.45)}
.upload-area{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.upload-row{display:flex;align-items:center;gap:8px}
.upload-area label{padding:5px 12px;border-radius:11px;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
.upload-area label:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
#csv-input{display:none}
.upload-btn{padding:5px 12px;border-radius:11px;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;transition:.15s}
.upload-btn:hover{background:rgba(255,255,255,.1)}
#upload-status{font-size:11px;color:rgba(255,255,255,.5)}
.outer{width:100%;max-width:1800px;margin:0 auto;padding:clamp(10px,1.2vw,16px) clamp(10px,1.5vw,20px)}
.tab-bar{display:flex;gap:5px;padding:4px;background:#e5e5ea;border-radius:10px;width:fit-content;margin-bottom:clamp(10px,1.5vw,16px)}
.tab{padding:6px clamp(12px,2.5vw,20px);border-radius:8px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;color:#7a7a7a;cursor:pointer;transition:.15s;white-space:nowrap}
.tab.on{background:#fff;color:#1d1d1f;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.tab:active{transform:scale(.97)}
.card{background:#fff;border-radius:18px;border:1px solid #e0e0e0;padding:clamp(14px,1.5vw,20px) clamp(14px,1.5vw,22px)}
.row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:clamp(10px,1.5vw,16px)}
.ttl{font-size:clamp(11px,1.2vw,13px);font-weight:600;color:#1d1d1f;letter-spacing:-.224px}
.tg{display:flex;gap:5px;flex-wrap:wrap}
.btn{padding:5px 11px;border-radius:11px;border:1px solid #e0e0e0;background:#fafafc;cursor:pointer;font-family:inherit;font-size:11px;color:#1d1d1f;letter-spacing:-.12px;transition:.15s;white-space:nowrap}
.btn:hover{background:#ebebf0}
.btn.on{background:#0066cc;border-color:#0066cc;color:#fff}
.btn:active{transform:scale(.95)}
.layout{display:flex;gap:14px;align-items:stretch}
.sidebar-col{width:clamp(240px,24%,380px);flex-shrink:0;display:flex;flex-direction:column}
.card-side{flex:1;display:flex;flex-direction:column;padding:clamp(14px,1.5vw,20px) clamp(12px,1.5vw,18px)}
.card-side .cw{flex:1;min-height:clamp(300px,42vh,520px)}
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.main-col .cw{height:clamp(300px,40vh,500px)}
.kpi-main-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.sub-bar{display:none;flex-wrap:wrap;gap:5px;padding:7px 10px;background:#ebebf0;border-radius:11px;margin-bottom:12px}
.sub-bar.open{display:flex}
.k-sec{margin-bottom:clamp(14px,1.8vw,22px)}
.k-sec-ttl{font-size:11px;font-weight:600;color:#7a7a7a;letter-spacing:.4px;text-transform:uppercase;margin-bottom:9px}
.k-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.k-row:last-child{margin-bottom:0}
.kcard{background:#fff;border:1px solid #e0e0e0;border-radius:18px;padding:clamp(12px,1.5vw,18px);flex:1 1 160px;min-width:140px;max-width:380px}
.kc-period{font-size:11px;color:#7a7a7a;margin-bottom:5px}
.kc-name{font-size:12px;color:#7a7a7a;margin-bottom:7px}
.kc-val{font-size:clamp(20px,2.5vw,26px);font-weight:600;color:#1d1d1f;letter-spacing:-.5px;line-height:1.1}
.kc-delta{font-size:11px;margin-top:5px;min-height:15px}
.kpair{display:flex;border:1px solid #e0e0e0;border-radius:18px;overflow:hidden;flex:2 1 340px;min-width:300px}
.kpair.full{flex:1 1 100%;min-width:0}
.kpair .kcard{flex:1;border:none;border-radius:0;border-right:1px solid #f0f0f0;max-width:none;min-width:120px}
.kpair .kcard:last-child{border-right:none}
/* 상태 오버레이 */
#state-overlay{position:fixed;inset:0;background:#f5f5f7;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#state-overlay h2{font-size:20px;font-weight:600;color:#1d1d1f}
#state-overlay p{font-size:14px;color:#7a7a7a}
.upload-cta{padding:12px 24px;background:#0066cc;color:#fff;border:none;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px}
.upload-cta:hover{background:#0071e3}
@media(max-width:960px){.layout{flex-direction:column}.sidebar-col{width:100%}.card-side .cw{min-height:240px;height:240px;flex:none}.main-col .cw{height:280px}}
@media(max-width:600px){.kpair{flex-direction:column;flex:1 1 140px;min-width:0}.kpair .kcard{border-right:none;border-bottom:1px solid #f0f0f0;max-width:none}.kpair .kcard:last-child{border-bottom:none}.kcard{max-width:none}}
</style>
</head>
<body>

<!-- 상태 오버레이 (데이터 없음 / 로딩 중) -->
<div id="state-overlay">
  <h2 id="state-title">데이터 로딩 중...</h2>
  <p id="state-desc"></p>
  <label class="upload-cta" style="display:none" id="cta-upload">
    <span>📂 CSV 업로드</span>
    <input type="file" accept=".csv" onchange="handleUploadCTA(this)">
  </label>
</div>

<header>
  <h1>고객지원파트 지표 대시보드</h1>
  <div class="upload-area">
    <div class="upload-row">
      <p id="header-info" style="margin:0">로딩 중...</p>
    </div>
    <div class="upload-row">
      <span id="last-updated" style="font-size:11px;color:rgba(255,255,255,.45)"></span>
    </div>
    <div class="upload-row">
      <label title="CSV 업로드 (원본·가공 모두 가능)">
        📂 업데이트
        <input type="file" id="csv-input" accept=".csv" onchange="handleUpload(this)">
      </label>
      <button class="upload-btn" onclick="doRollback()" title="직전 버전으로 복구">↩ 되돌리기</button>
      <span id="upload-status"></span>
    </div>
  </div>
</header>

<div class="outer" id="main-content" style="display:none">
<div class="tab-bar">
  <button class="tab on" onclick="switchTab('charts',this)">그래프</button>
  <button class="tab"    onclick="switchTab('kpi',this)">KPI 카드</button>
  <button class="tab"    onclick="switchTab('metrics',this)">지표 현황</button>
</div>

<div id="tab-charts">
<div class="layout">
  <div class="sidebar-col">
    <div class="card card-side">
      <div class="row">
        <span class="ttl">① 배정건 &mdash; 완료 / 진행 중</span>
        <div class="tg" id="t1">
          <button class="btn on" onclick="sv(1,'monthly',this)">월별</button>
          <button class="btn"    onclick="sv(1,'weekly',this)">8주</button>
          <button class="btn"    onclick="sv(1,'daily',this)">10영업일</button>
        </div>
      </div>
      <div class="cw"><canvas id="c1"></canvas></div>
    </div>
  </div>
  <div class="main-col">
    <div class="card">
      <div class="row">
        <span class="ttl">② 성공 / 종결 비중 추이</span>
        <div class="tg" id="t2">
          <button class="btn on" onclick="sv(2,'monthly',this)">전체 월별</button>
          <button class="btn"    onclick="sv(2,'weekly',this)">최근 8주</button>
          <button class="btn"    onclick="sv(2,'daily',this)">최근 10영업일</button>
        </div>
      </div>
      <div class="cw"><canvas id="c2"></canvas></div>
    </div>
    <div class="card">
      <div class="row">
        <span class="ttl">③ 내재화 접수 건수 / 기여율 추이</span>
        <div class="tg" id="t3">
          <button class="btn on" onclick="sv(3,'monthly',this)">전체 월별</button>
          <button class="btn"    onclick="sv(3,'weekly',this)">최근 8주</button>
          <button class="btn"    onclick="sv(3,'daily',this)">최근 10영업일</button>
        </div>
      </div>
      <div class="cw"><canvas id="c3"></canvas></div>
    </div>
  </div>
</div>
</div>

<div id="tab-kpi" style="display:none">
  <div class="kpi-main-bar" id="kmb">
    <button class="btn on" onclick="setTop('3month',this)">최근 3개월</button>
    <button class="btn"    onclick="setTop('monthly',this)">월별 &#9662;</button>
    <button class="btn"    onclick="setTop('quarterly',this)">분기별 &#9662;</button>
  </div>
  <div id="sub-monthly"   class="sub-bar"></div>
  <div id="sub-quarterly" class="sub-bar"></div>
  <div id="kgrid"></div>
</div>

<div id="tab-metrics" style="display:none">
  <div class="card" style="padding:clamp(14px,1.5vw,20px)">
    <div class="row" style="margin-bottom:12px">
      <span class="ttl">지표 현황</span>
      <button class="btn" id="copy-btn" onclick="copyMetrics()">복사</button>
    </div>
    <textarea id="metrics-text" style="display:none"></textarea>
    <div id="metrics-area" style="overflow-x:auto"></div>
  </div>
</div>
</div><!-- /main-content -->

<script>
/* ── CSV 집계 로직 ── */
const FLAGS = ['a','b','c','d','e','f','g','h','i','성공','기타','내재화총','취소유도','취소신청후','실컨택성공','실컨택유도','실컨택신청후'];
const RATES = ['r_kt','r_l2','r_c','r_d','r_e','r_f','r_g','r_h','r_i','r_gr','r_s','r_z','r_zc','r_zd','r_ss','r_ssc','r_ssd'];

function aggGroup(rows) {
  const n = rows.length;
  if(!n) return null;
  const r = {n};
  FLAGS.forEach(f => { r[f] = rows.reduce((s,row) => s+(parseFloat(row[f])||0), 0); });
  RATES.forEach(rt => {
    const vals = rows.map(row => parseFloat(row[rt])).filter(v => !isNaN(v));
    r[rt] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  });
  r['ge'] = r['기타'];
  r['취소총'] = r.e + r.f;
  return r;
}

function groupBy(rows, keyFn) {
  const g = {};
  rows.forEach(row => { const k=keyFn(row); if(k){(g[k]=g[k]||[]).push(row);} });
  return g;
}
function finalize(groups) {
  const r = {};
  Object.keys(groups).sort().forEach(k => { r[k]=aggGroup(groups[k]); });
  return r;
}

function addMonths(ym, n) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m-1+n, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function fmtM(ym) {
  const [y,m] = ym.split('-');
  return `${y.slice(2)}년 ${parseInt(m)}월`;
}
function fmtQ(q) { return `${q.slice(2,4)}년 ${q.slice(-1)}Q`; }

function processCSV(text) {
  const rows = Papa.parse(text, {header:true, skipEmptyLines:true}).data;

  const allDates  = [...new Set(rows.map(r=>r['배정일']).filter(Boolean))].sort();
  const refDate   = allDates[allDates.length-1];

  const allWeeks = [...new Set(rows.map(r=>r['_w']).filter(Boolean))].sort();
  const last8w   = new Set(allWeeks.slice(-8));
  const last10d  = new Set(allDates.slice(-10));

  const chart = {
    monthly: finalize(groupBy(rows, r=>r['_m'])),
    weekly:  finalize(groupBy(rows.filter(r=>last8w.has(r['_w'])), r=>r['_w'])),
    daily:   finalize(groupBy(rows.filter(r=>last10d.has(r['배정일'])), r=>r['배정일'])),
  };

  /* KPI */
  const months   = [...new Set(rows.map(r=>r['_m']).filter(Boolean))].sort();
  const quarters = [...new Set(rows.map(r=>r['_q']).filter(Boolean))].sort();
  const refM     = months[months.length-1];
  const c3s      = addMonths(refM,-2);
  const p3s      = addMonths(refM,-5);
  const p3e      = addMonths(refM,-3);
  const c3lbl    = c3s.slice(0,4)===refM.slice(0,4)
                   ? `${fmtM(c3s)}~${parseInt(refM.split('-')[1])}월`
                   : `${fmtM(c3s)}~${fmtM(refM)}`;
  const p3lbl    = p3s.slice(0,4)===p3e.slice(0,4)
                   ? `${fmtM(p3s)}~${parseInt(p3e.split('-')[1])}월`
                   : `${fmtM(p3s)}~${fmtM(p3e)}`;

  const kpiM={}, kpiQ={};
  months.forEach((m,i) => {
    kpiM[m]={label:fmtM(m), prev_label:i>0?fmtM(months[i-1]):null,
             cur:aggGroup(rows.filter(r=>r['_m']===m)),
             prev:i>0?aggGroup(rows.filter(r=>r['_m']===months[i-1])):null};
  });
  quarters.forEach((q,i) => {
    kpiQ[q]={label:fmtQ(q), prev_label:i>0?fmtQ(quarters[i-1]):null,
             cur:aggGroup(rows.filter(r=>r['_q']===q)),
             prev:i>0?aggGroup(rows.filter(r=>r['_q']===quarters[i-1])):null};
  });

  const kpi={
    '3month':{label:c3lbl, prev_label:p3lbl,
              cur:aggGroup(rows.filter(r=>r['_m']>=c3s)),
              prev:aggGroup(rows.filter(r=>r['_m']>=p3s&&r['_m']<=p3e))},
    monthly:kpiM, quarterly:kpiQ,
  };

  const updated = rows.length ? (rows[0]['_updated'] || '') : '';
  return {chart, kpi, refDate, updated, rows:rows.length};
}

/* ── 전역 데이터 ── */
let D={}, KPI={};

/* ── 차트 ── */
const GRID={color:'rgba(0,0,0,.06)'};
const LEG={position:'top',labels:{boxWidth:11,padding:12,font:{size:11}}};
const C={
  c1a:'rgba(0,102,204,.85)',  c1b:'rgba(220,53,69,.6)',
  c2a:'rgba(0,64,153,.88)',   c2b:'rgba(0,122,255,.45)',
  c2c:'rgba(255,149,0,.85)',  c2d:'rgba(255,59,48,.85)',  c2e:'rgba(142,142,147,.32)',
  c3a:'rgba(0,64,153,.9)',    c3b:'rgba(0,102,204,.75)',  c3c:'rgba(0,153,255,.45)',
  ln:'rgb(255,59,48)',
};
const fL=(s,v)=>{
  if(v==='monthly'){const[y,m]=s.split('-');return y.slice(2)+'.'+m;}
  if(v==='weekly') return s.replace(/^\d{4}-/,'');
  return s.slice(5).replace('-','/');
};
function makeTip(vd,ks){return{callbacks:{label(ctx){
  const horiz=ctx.chart.options.indexAxis==='y';
  const n=horiz?(ctx.parsed.x??0):(ctx.parsed.y??0);
  const k=ks[ctx.dataIndex]; if(!k) return '';
  if(ctx.dataset.yAxisID==='y2') return ` ${ctx.dataset.label}: ${n.toFixed(1)}%`;
  const rk=ctx.dataset._rk;
  const pct=(rk&&vd[k][rk]!=null)?vd[k][rk]:(vd[k].n>0?n/vd[k].n*100:0);
  return ` ${ctx.dataset.label}: ${n}건 (${pct.toFixed(1)}%)`;
}}};}
function bOpt(tip,sc){return{responsive:true,maintainAspectRatio:false,plugins:{tooltip:tip,legend:LEG},scales:sc};}
function cfg1(v){const vd=D[v],ks=Object.keys(vd).sort();
  return{type:'bar',data:{labels:ks.map(k=>fL(k,v)),datasets:[
    {label:'완료건',      data:ks.map(k=>vd[k].a),backgroundColor:C.c1a,stack:'s'},
    {label:'추적 진행 중',data:ks.map(k=>vd[k].b),backgroundColor:C.c1b,stack:'s'},
  ]},options:{...bOpt(makeTip(vd,ks),{x:{stacked:true,grid:GRID,title:{display:true,text:'건수',font:{size:11}}},y:{stacked:true,grid:{display:false}}}),indexAxis:'y'}};}
function cfg2(v){const vd=D[v],ks=Object.keys(vd).sort();
  return{type:'bar',data:{labels:ks.map(k=>fL(k,v)),datasets:[
    {label:'컨택후성공 · 신청유도',   data:ks.map(k=>vd[k].c), backgroundColor:C.c2a,stack:'s',_rk:'r_c'},
    {label:'컨택후성공 · 신청후작성', data:ks.map(k=>vd[k].d), backgroundColor:C.c2b,stack:'s',_rk:'r_d'},
    {label:'종결 · 부재종결',         data:ks.map(k=>vd[k].e), backgroundColor:C.c2c,stack:'s',_rk:'r_e'},
    {label:'종결 · 신청취소',         data:ks.map(k=>vd[k].f), backgroundColor:C.c2d,stack:'s',_rk:'r_f'},
    {label:'기타',                    data:ks.map(k=>vd[k].ge),backgroundColor:C.c2e,stack:'s'},
  ]},options:bOpt(makeTip(vd,ks),{x:{stacked:true,grid:GRID},y:{stacked:true,grid:GRID,title:{display:true,text:'건수',font:{size:11}}}})};
}
function cfg3(v){const vd=D[v],ks=Object.keys(vd).sort();
  return{type:'bar',data:{labels:ks.map(k=>fL(k,v)),datasets:[
    {label:'신청유도 접수',   data:ks.map(k=>vd[k].g),      backgroundColor:C.c3a,stack:'s',yAxisID:'y1',_rk:'r_g'},
    {label:'로직2 접수',     data:ks.map(k=>vd[k].h),      backgroundColor:C.c3b,stack:'s',yAxisID:'y1',_rk:'r_h'},
    {label:'신청후작성 접수', data:ks.map(k=>vd[k].i),      backgroundColor:C.c3c,stack:'s',yAxisID:'y1',_rk:'r_i'},
    {label:'내재화 기여율(%)',data:ks.map(k=>vd[k].r_gr??0),type:'line',yAxisID:'y2',
     borderColor:C.ln,backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:C.ln,tension:.3},
  ]},options:bOpt(makeTip(vd,ks),{x:{stacked:true,grid:GRID},y1:{stacked:true,position:'left',grid:GRID,title:{display:true,text:'건수',font:{size:11}}},y2:{position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'기여율(%)',font:{size:11}},min:0,max:100}})};
}
const CH={},BLD={1:cfg1,2:cfg2,3:cfg3};
function initCharts(){[1,2,3].forEach(n=>{if(CH[n]){CH[n].destroy();}CH[n]=new Chart(document.getElementById('c'+n),BLD[n]('monthly'));});}
function sv(n,v,btn){btn.closest('.tg').querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');CH[n].destroy();CH[n]=new Chart(document.getElementById('c'+n),BLD[n](v));}
function switchTab(name,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('tab-charts').style.display=name==='charts'?'':'none';document.getElementById('tab-kpi').style.display=name==='kpi'?'':'none';document.getElementById('tab-metrics').style.display=name==='metrics'?'':'none';}

/* ── KPI ── */
const SECS=[
  {title:'배정 현황',rows:[[{label:'총 배정건',key:'n',type:'cnt',hib:true},{label:'완료건',key:'a',type:'cnt',hib:true},{label:'추적 진행 중',key:'b',type:'cnt',hib:null}]]},
  {title:'컨택',rows:[[{label:'컨택 완료율',key:'r_kt',type:'rate',hib:true},{label:'로직2 유도 성공률',key:'r_l2',type:'rate',hib:true}]]},
  {title:'내재화 접수 기여',rows:[

function fmt(v,t){if(v==null)return '—';if(t!=='cnt')return v===100?'100%':v.toFixed(2)+'%';return v.toLocaleString()+'건';}
function fmtDelta(cur,prv,type,hib,prevLbl){
  if(cur==null||prv==null)return '<span style="color:#c7c7cc">이전 기간 없음</span>';
  const diff=cur-prv;
  if(Math.abs(diff)<(type==='rate'?.005:.5))return '<span style="color:#c7c7cc">—</span>';
  const arrow=diff>0?'↑':'↓';
  const good=hib==null?null:(hib?diff>0:diff<0);
  const col=good==null?'#8e8e93':(good?'#34c759':'#ff3b30');
  const txt=type==='cnt'?`${arrow}${Math.abs(diff).toLocaleString()}건 (${Math.abs(diff/prv*100).toFixed(1)}%)`:`${arrow}${Math.abs(diff).toFixed(2)}%p`;
  const vs=prevLbl?`<span style="color:#c7c7cc;font-size:10px"> vs ${prevLbl}</span>`:'';
  return `<span style="color:${col}">${txt}</span>${vs}`;
}
function makeCard(def,kd){const cv=kd.cur?kd.cur[def.key]:null,pv=kd.prev?kd.prev[def.key]:null;const el=document.createElement('div');el.className='kcard';el.innerHTML=`<div class="kc-period">${kd.label}</div><div class="kc-name">${def.label}</div><div class="kc-val">${fmt(cv,def.type)}</div><div class="kc-delta">${fmtDelta(cv,pv,def.type,def.hib,kd.prev_label)}</div>`;return el;}

function cellPct(cur, prev, lb) {
  if (cur == null) return '—';
  const s = cur.toFixed(2) + '%';
  if (prev == null) return s;
  const diff = cur - prev;
  if (Math.abs(diff) < 0.005) return `${s} (-)`;
  const arrow = diff > 0 ? '▲' : '▼';
  const good = (diff > 0) !== lb;
  return `${s} ${good?'🔵':'🔴'}(${arrow}${Math.abs(diff).toFixed(2)}%p)`;
}
function cellCnt(cur, prev, lb) {
  if (cur == null) return '—';
  const n = Math.round(cur);
  const s = n.toLocaleString() + '건';
  if (prev == null) return s;
  const diff = n - Math.round(prev);
  if (diff === 0) return `${s} (-)`;
  const arrow = diff > 0 ? '▲' : '▼';
  const good = (diff > 0) !== lb;
  return `${s} ${good?'🔵':'🔴'}(${arrow}${Math.abs(diff).toLocaleString()}건)`;
}
function renderMetricsTable() {
  const md = D.monthly;
  if (!md) return;
  const months = Object.keys(md).sort();
  const headers = ['구분', ...months.map(m => fmtM(m))];
  // 마크다운 텍스트 (복사용)
  const lines = [];
  lines.push('| ' + headers.join(' | ') + ' |');
  lines.push('|' + '---|'.repeat(headers.length));
  const rowData = [];
  for (const row of TABLE_ROWS) {
    const cells = [row.label];
    for (let i = 0; i < months.length; i++) {
      const cur  = md[months[i]]?.[row.key] ?? null;
      const prev = i > 0 ? (md[months[i-1]]?.[row.key] ?? null) : null;
      cells.push(row.type === 'pct' ? cellPct(cur, prev, row.lb) : cellCnt(cur, prev, row.lb));
    }
    lines.push('| ' + cells.join(' | ') + ' |');
    rowData.push(cells);
  }
  document.getElementById('metrics-text').value = lines.join('\n');
  // HTML 테이블 렌더링
  const area = document.getElementById('metrics-area');
  const tbl = document.createElement('table');
  tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:11px;line-height:1.6';
  // 헤더
  const thead = tbl.createTHead();
  const hr = thead.insertRow();
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    th.style.cssText = 'padding:6px 10px;border:1px solid #e0e0e0;background:#f5f5f7;font-weight:600;white-space:nowrap;text-align:left';
    hr.appendChild(th);
  });
  // 바디
  const tbody = tbl.createTBody();
  rowData.forEach(cells => {
    const tr = tbody.insertRow();
    cells.forEach((c, ci) => {
      const td = document.createElement('td');
      td.textContent = c;
      td.style.cssText = `padding:5px 10px;border:1px solid #e0e0e0;white-space:nowrap;${ci===0?'font-weight:500;background:#fafafc':''}`;
      tr.appendChild(td);
    });
  });
  area.innerHTML = '';
  area.appendChild(tbl);
}

async function doRollback() {
  const statusEl = document.getElementById('upload-status');
  if (!confirm('직전 버전으로 되돌릴까요?')) return;
  statusEl.textContent = '복구 중...';
  try {
    const res = await fetch('/api/rollback', {method:'POST'});
    if (!res.ok) { const e=await res.json(); throw new Error(e.error||'실패'); }
    statusEl.textContent = '✓ 복구 완료';
    setTimeout(() => { statusEl.textContent=''; }, 3000);
    const data = await fetch('/api/data?t='+Date.now());
    applyData(processCSV(await data.text()));
  } catch(e) {
    statusEl.textContent = '실패: '+e.message;
  }
}

function getISOWeek(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - (dt.getDay()+6)%7);
  const w1 = new Date(dt.getFullYear(),0,4);
  const wn = 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7);
  return `${dt.getFullYear()}-W${String(wn).padStart(2,'0')}`;
}
function sanitizeRaw(text, fileLastModified) {
  const rows = Papa.parse(text, {header:true, skipEmptyLines:true}).data;
  const _d = new Date(fileLastModified || Date.now());
  const _p = n => String(n).padStart(2,'0');
  const now = `${_d.getFullYear()}-${_p(_d.getMonth()+1)}-${_p(_d.getDate())} ${_p(_d.getHours())}:${_p(_d.getMinutes())}`;
  const p2 = n => String(n).padStart(2,'0');
  const fmtD = d => d ? `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}` : '';
  const out = [];
  for (const r of rows) {
    if (String(r['토스_8910_전수조사']).trim() === '1') continue;
    const 배정일raw = r['체크리스트_담당자_배정일'];
    if (!배정일raw) continue;
    const 배정일 = new Date(배정일raw);
    if (isNaN(배정일) || 배정일 < new Date('2025-12-01')) continue;
    const 완료일raw = r['체크리스트_완료일'];
    const 완료일 = 완료일raw ? new Date(완료일raw) : null;
    const Y = r['new_Y로직'] || '';
    const 담당자  = !!r['체크리스트_담당자'];
    const sub    = !!r['submitted_date'];
    const 최초   = r['체크리스트 최초 컨택'] || '';
    const 유도   = r['체크리스트_유도 status'] || '';
    const 검증   = r['체크리스트_검증 status'] || '';
    const not대  = 유도 !== '대상아님';
    const 체크완료 = r['신체크리스트_완료여부'] === 'checked';
    const 체크빈칸 = !r['신체크리스트_완료여부'];
    const 내1 = Y.includes('1주택단순비과세');
    const 내2 = Y.includes('일시적2주택');
    const 내3 = Y.includes('취득자산');
    const 김경문   = r['실무_담당자'] === '김경문';
    const 유도계   = 최초==='신청전' || 최초==='로직2' || !최초;
    const 신청후계  = 최초==='검증콜' || 최초==='회계사검토중';
    const 신청유도순 = 최초==='신청전' || !최초;
    const pending  = r['pending_status'] || '';
    const 종결cond = 유도==='종결' || 검증==='종결';
    const case1 = 담당자 && not대 && 체크빈칸 && r['user_status_progress']==='환급불가-신청전';
    const case2 = 담당자 && not대 && 체크완료 && ['문자발송','자연성공','확인완료','환급불가','검증콜대상'].includes(유도) && 검증!=='종결';
    const 성공  = case1 || case2;
    const 통화초num        = parseFloat(r['체크리스트_통화시간 (초)']) || 0;
    const 통화분num        = parseFloat(r['체크리스트_통화시간 (분)']) || 0;
    const 통화있음         = 통화초num > 0 || 통화분num > 0;
    const _m = `${배정일.getFullYear()}-${p2(배정일.getMonth()+1)}`;
    const _q = `${배정일.getFullYear()}Q${Math.ceil((배정일.getMonth()+1)/3)}`;
    const row = {
      배정일: fmtD(배정일), 완료일: fmtD(완료일),
      _m, _q, _w: getISOWeek(배정일),
      a: (담당자 && !!완료일) ?1:0,
      b: (담당자 && !완료일)  ?1:0,
      c: (성공 && 유도계)     ?1:0,
      d: (성공 && 신청후계)   ?1:0,
      e: (종결cond && 담당자 && not대 && !pending) ?1:0,
      f: (종결cond && 담당자 && not대 && pending==='신청취소') ?1:0,
      취소유도:   (종결cond && 담당자 && not대 && !['진행재개','환급불가'].includes(pending) && 유도계) ?1:0,
      취소신청후:  (종결cond && 담당자 && not대 && !['진행재개','환급불가'].includes(pending) && 신청후계) ?1:0,
      실컨택성공:  (성공 && 통화있음) ?1:0,
      실컨택유도:  (성공 && 유도계 && 통화있음) ?1:0,
      실컨택신청후: (성공 && 신청후계 && 통화있음) ?1:0,
      g: (sub && 담당자 && (내1||내2||김경문) && 신청유도순) ?1:0,
      h: (sub && 담당자 && (내3||(최초==='로직2'))) ?1:0,
      i: (sub && 담당자 && (내1||내2||김경문) && 신청후계) ?1:0,
      성공: 성공?1:0,
    };
    row['내재화총'] = row.g + row.h + row.i;

    // ── 율 지표 직접 계산 (에어테이블 포뮬라 기준) ──
    const progress        = !!r['progress'];
    const 환급불가신청전   = r['user_status_progress'] === '환급불가-신청전';
    const 회계사검토중아님  = r['user_status_progress'] !== '회계사검토중';
    const 검증콜대상        = 유도 === '검증콜대상';

    // r_kt: 컨택완료율 — 분모: 담당자, 분자: 완료일
    row.r_kt = 담당자 ? (완료일raw ? 100 : 0) : null;

    // r_l2: 로직2유도 성공률 — 분모: 취득자산 AND 담당자 AND not대 AND 유도≠추가정보수취
    const l2d = 내3 && 담당자 && not대 && 유도 !== '추가정보수취';
    row.r_l2 = l2d ? ((유도==='확인완료'||검증==='검증완료') ? 100 : 0) : null;

    // r_c: 컨택성공 신청유도 — 분모: 담당자 AND not대 AND 최초=BLANK/신청전/로직2, 분자: 성공(case1|case2)
    const rcd = 담당자 && not대 && (!최초||최초==='신청전'||최초==='로직2');
    row.r_c = rcd ? (성공 ? 100 : 0) : null;

    // r_d: 컨택성공 신청후작성 — 분모: 담당자 AND not대 AND 최초=검증콜/회계사검토중, 분자: 성공(case1|case2)
    const rdd = 담당자 && not대 && (최초==='검증콜'||최초==='회계사검토중');
    row.r_d = rdd ? (성공 ? 100 : 0) : null;

    // r_s: 컨택후성공률 — 분모: 담당자 AND not대, 분자: 성공(case1|case2)
    row.r_s = (담당자 && not대) ? (성공 ? 100 : 0) : null;

    // r_e: 부재종결율 — 분모: 담당자 AND not대, 분자: 종결 AND pending=BLANK
    row.r_e = (담당자 && not대) ? (종결cond && !pending ? 100 : 0) : null;

    // r_f: 취소요청율 — 분모: 담당자 AND not대, 분자: 종결 AND pending=신청취소
    row.r_f = (담당자 && not대) ? (종결cond && pending==='신청취소' ? 100 : 0) : null;

    // r_z: 취소율 — 분모: 담당자 AND not대, 분자: 종결
    row.r_z = (담당자 && not대) ? (종결cond ? 100 : 0) : null;

    // r_zc: 취소율 신청유도 — 분모: 담당자 AND not대 AND 최초=BLANK/신청전/로직2
    const rzcd = 담당자 && not대 && (!최초||최초==='신청전'||최초==='로직2');
    row.r_zc = rzcd ? (종결cond ? 100 : 0) : null;

    // r_zd: 취소율 신청후 — 분모: 담당자 AND not대 AND 최초=검증콜/회계사검토중
    const rzdd = 담당자 && not대 && (최초==='검증콜'||최초==='회계사검토중');
    row.r_zd = rzdd ? (종결cond ? 100 : 0) : null;

    // r_gr: 내재화 기여율 통합 — 분모: 담당자 AND progress AND 회계사검토중아님 AND (내1|내2|내3)
    const rgrd = 담당자 && progress && 회계사검토중아님 && (내1||내2||내3);
    row.r_gr = rgrd ? (sub ? 100 : 0) : null;

    // r_g: 내재화 신청유도 기여율 — 분모: +최초=BLANK/신청전 AND (내1|내2)
    const rgd = 담당자 && progress && 회계사검토중아님 && (!최초||최초==='신청전') && (내1||내2);
    row.r_g = rgd ? (sub ? 100 : 0) : null;

    // r_h: 로직2 접수기여율 — 분모: +최초=로직2 AND 취득자산
    const rhd = 담당자 && progress && 회계사검토중아님 && 최초==='로직2' && 내3;
    row.r_h = rhd ? (sub ? 100 : 0) : null;

    // r_i: 내재화 신청후작성 기여율 — 분모: +최초=검증콜/회계사검토중 AND (내1|내2)
    const rid = 담당자 && progress && 회계사검토중아님 && (최초==='검증콜'||최초==='회계사검토중') && (내1||내2);
    row.r_i = rid ? (sub ? 100 : 0) : null;

    // r_ss: 실컨택성공률 — 분모: 담당자 AND not대 AND 통화있음, 분자: 성공(case1|case2)
    const rssd = 담당자 && not대 && 통화있음;
    row.r_ss  = rssd                 ? (성공 ? 100 : 0) : null;
    row.r_ssc = (rssd && 유도계)     ? (성공 ? 100 : 0) : null;
    row.r_ssd = (rssd && 신청후계)   ? (성공 ? 100 : 0) : null;
    row['_updated'] = now;
    out.push(row);
  }
  return Papa.unparse(out);
}

/* ── 업로드 처리 ── */
async function doUpload(file) {
  if (!file) return;
  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = '처리 중...';
  try {
    let text = await file.text();
    // 원본 CSV(전체데이터) 감지 → 자동 익명화
    const sample = Papa.parse(text, {header:true, skipEmptyLines:true, preview:1}).data;
    if (sample.length && '체크리스트_담당자_배정일' in sample[0]) {
      text = sanitizeRaw(text, file.lastModified);
    }
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: {'Content-Type': 'text/csv'},
      body: text,
    });
    if (!res.ok) throw new Error('서버 오류 ' + res.status);
    statusEl.textContent = '✓ 완료';
    setTimeout(() => { statusEl.textContent=''; }, 3000);
    applyData(processCSV(text));
  } catch(e) {
    statusEl.textContent = '실패: ' + e.message;
  }
}
function handleUpload(input)     { doUpload(input.files[0]); input.value=''; }
function handleUploadCTA(input)  { doUpload(input.files[0]); }

loadData();
